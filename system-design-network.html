<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design — Knowledge Network</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#070b12;--grid:rgba(255,255,255,0.025);
    --text:#e8f0fe;--muted:#4a5568;
    --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
  }
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(7,11,18,0.85) 100%);pointer-events:none;z-index:1}
  .legend{position:fixed;bottom:20px;left:20px;z-index:100;background:rgba(13,19,32,0.88);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 18px;backdrop-filter:blur(10px)}
  .legend-title{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .legend-item{display:flex;align-items:center;gap:9px;margin-bottom:7px;font-size:11px;color:rgba(232,240,254,.75)}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .hint{position:fixed;bottom:20px;right:20px;z-index:100;font-size:10px;color:var(--muted);letter-spacing:.1em;text-align:right;line-height:2}
  #graph{position:fixed;inset:0;z-index:2;cursor:grab}
  #graph:active{cursor:grabbing}
  .link{stroke:rgba(255,255,255,0.07);stroke-width:1.5;fill:none;transition:stroke .25s,stroke-width .25s,stroke-opacity .25s}
  .link.active{stroke-width:3;stroke-opacity:.9}
  .link.dimmed{stroke-opacity:.015}
  .node-group{cursor:pointer}
  .node-halo{fill:none;stroke-width:1;opacity:.12;transition:opacity .25s}
  .node-group:hover .node-halo{opacity:.5}
  .node-body{stroke-width:2.5;transition:filter .2s}
  .node-group:hover .node-body{filter:brightness(1.5) !important}
  .node-icon{pointer-events:none;dominant-baseline:middle;text-anchor:middle}
  .node-label{font-family:var(--mono);fill:rgba(232,240,254,.45);text-anchor:middle;pointer-events:none;letter-spacing:.03em;transition:fill .2s}
  .node-group:hover .node-label{fill:rgba(232,240,254,1)}
  .node-group.dimmed{opacity:.07}
  @keyframes pulse{0%{r:22px;opacity:.55}100%{r:50px;opacity:0}}
  .pulse-ring{fill:none;stroke-width:1.5;opacity:0;pointer-events:none}
  .node-group:hover .pulse-ring{animation:pulse 1.5s ease-out infinite}
  #tooltip{position:fixed;z-index:300;pointer-events:none;opacity:0;transform:translateY(8px);transition:opacity .15s,transform .15s}
  #tooltip.show{opacity:1;transform:translateY(0)}
  .tt-box{background:rgba(8,13,22,.97);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 18px;max-width:240px;box-shadow:0 16px 48px rgba(0,0,0,.75);backdrop-filter:blur(20px)}
  .tt-cat{font-size:8px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px}
  .tt-name{font-family:var(--sans);font-size:16px;font-weight:800;line-height:1.25;margin-bottom:6px}
  .tt-diff{font-size:9px;opacity:.45;margin-bottom:8px;letter-spacing:.1em}
  .tt-conn{font-size:9px;color:var(--muted);line-height:1.7}
  .tt-cta{margin-top:10px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;opacity:.35}
  .blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;opacity:.035;animation:float 14s ease-in-out infinite}
  .b1{width:600px;height:600px;background:#00e5ff;top:-150px;left:-150px}
  .b2{width:500px;height:500px;background:#b48eff;bottom:-120px;right:-120px;animation-delay:-7s}
  @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,14px)}}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<svg id="graph"></svg>
<div id="tooltip">
  <div class="tt-box">
    <div class="tt-cat" id="tt-cat"></div>
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-diff" id="tt-diff"></div>
    <div class="tt-conn" id="tt-conn"></div>
    <div class="tt-cta">↗ Click to open in Notion</div>
  </div>
</div>
<div class="legend">
  <div class="legend-title">Categories</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00e5ff;box-shadow:0 0 8px #00e5ff55"></div>Foundations</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00ff8c;box-shadow:0 0 8px #00ff8c55"></div>Scalability</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff8c00;box-shadow:0 0 8px #ff8c0055"></div>Storage</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff3d71;box-shadow:0 0 8px #ff3d7155"></div>Reliability</div>
  <div class="legend-item"><div class="legend-dot" style="background:#b48eff;box-shadow:0 0 8px #b48eff55"></div>Communication</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffe066;box-shadow:0 0 8px #ffe06655"></div>Architecture</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8ecfff;box-shadow:0 0 8px #8ecfff55"></div>Reference</div>
</div>
<div class="hint">Drag · Scroll to zoom · Hover · Click to open</div>
<script>
const CC={Foundations:'#00e5ff',Scalability:'#00ff8c',Storage:'#ff8c00',Reliability:'#ff3d71',Communication:'#b48eff',Architecture:'#ffe066',Reference:'#8ecfff'};
const CI={Foundations:'◈',Scalability:'⬡',Storage:'⬢',Reliability:'◉',Communication:'◎',Architecture:'◆',Reference:'◇'};
const nodes=[
  {id:0,name:'What Is System Design?',short:'What Is SD?',cat:'Foundations',diff:'Beginner',url:'https://www.notion.so/33e443bad5c88175a3ffc7d3dab32d28'},
  {id:1,name:'The Three Pillars',short:'Three Pillars',cat:'Foundations',diff:'Beginner',url:'https://www.notion.so/33e443bad5c88139aad4dcd8a9c66cf3'},
  {id:2,name:'Core Concepts & Characteristics',short:'Core Concepts',cat:'Foundations',diff:'Beginner',url:'https://www.notion.so/33e443bad5c881ffa065dc3d2d8815ca'},
  {id:3,name:'CAP Theorem',short:'CAP Theorem',cat:'Foundations',diff:'Intermediate',url:'https://www.notion.so/33e443bad5c881589974ccac9dd634aa'},
  {id:4,name:'Scalability Strategies',short:'Scalability',cat:'Scalability',diff:'Intermediate',url:'https://www.notion.so/33e443bad5c881819500f6a94561ea81'},
  {id:5,name:'Databases & Storage',short:'Databases',cat:'Storage',diff:'Intermediate',url:'https://www.notion.so/33e443bad5c8816f9a05da505464c873'},
  {id:6,name:'Caching',short:'Caching',cat:'Storage',diff:'Intermediate',url:'https://www.notion.so/33e443bad5c8813ba478ea0409bd0e25'},
  {id:7,name:'Load Balancing',short:'Load Balancing',cat:'Scalability',diff:'Intermediate',url:'https://www.notion.so/33e443bad5c88144a73ceaa9baad63f5'},
  {id:8,name:'Communication Protocols & APIs',short:'Protocols & APIs',cat:'Communication',diff:'Intermediate',url:'https://www.notion.so/33e443bad5c881acb673d9de807383c5'},
  {id:9,name:'Message Queues & EDA',short:'Message Queues',cat:'Communication',diff:'Advanced',url:'https://www.notion.so/33e443bad5c8811fa2dec4c1607267b4'},
  {id:10,name:'Architecture Patterns',short:'Architecture',cat:'Architecture',diff:'Advanced',url:'https://www.notion.so/33e443bad5c88190b145ffedd00869a4'},
  {id:11,name:'High Availability & Fault Tolerance',short:'HA & Fault Tol.',cat:'Reliability',diff:'Advanced',url:'https://www.notion.so/33e443bad5c881f987ceddaec078baea'},
  {id:12,name:'CDN & Networking',short:'CDN & Networking',cat:'Communication',diff:'Intermediate',url:'https://www.notion.so/33e443bad5c881d6a4ece9fd2dcba9e2'},
  {id:13,name:'The 7-Step Interview Framework',short:'7-Step Framework',cat:'Reference',diff:'Beginner',url:'https://www.notion.so/33e443bad5c881d88afed9b62e7bf28b'},
  {id:14,name:'Key Trade-Offs Cheat Sheet',short:'Trade-Offs',cat:'Reference',diff:'Intermediate',url:'https://www.notion.so/33e443bad5c8812e9f62d8da62edd691'},
  {id:15,name:'Recommended Resources',short:'Resources',cat:'Reference',diff:'Beginner',url:'https://www.notion.so/33e443bad5c8816b9c67c4bc589f72e1'},
];
const edgeList=[[0,1],[0,2],[0,13],[0,15],[1,2],[1,4],[1,11],[1,14],[2,3],[2,5],[2,14],[3,5],[3,4],[3,11],[3,14],[4,7],[4,5],[4,6],[4,12],[5,6],[6,7],[6,12],[7,11],[7,12],[8,9],[8,10],[8,12],[9,10],[9,4],[9,11],[10,4],[10,11],[10,14],[11,7],[11,3],[11,5],[12,8],[13,14],[13,15],[14,3],[14,5],[14,10],[14,2]];
const seen=new Set();
const links=edgeList.filter(([s,t])=>{const k=s<t?`${s}-${t}`:`${t}-${s}`;if(seen.has(k))return false;seen.add(k);return true}).map(([source,target])=>({source,target}));
const adj={};nodes.forEach(n=>adj[n.id]=[]);
links.forEach(l=>{adj[l.source].push(l.target);adj[l.target].push(l.source);});

const svg=d3.select('#graph');
let W=window.innerWidth,H=window.innerHeight;
svg.attr('width',W).attr('height',H);
const g=svg.append('g');
const defs=svg.append('defs');
Object.entries(CC).forEach(([cat,col])=>{
  const f=defs.append('filter').attr('id',`g-${cat}`).attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%');
  f.append('feGaussianBlur').attr('stdDeviation','6').attr('result','b');
  const m=f.append('feMerge');m.append('feMergeNode').attr('in','b');m.append('feMergeNode').attr('in','SourceGraphic');
});
const zoom=d3.zoom().scaleExtent([0.15,5]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoom);
const sim=d3.forceSimulation(nodes)
  .force('link',d3.forceLink(links).id(d=>d.id).distance(220).strength(0.3))
  .force('charge',d3.forceManyBody().strength(-900))
  .force('center',d3.forceCenter(W/2,H/2))
  .force('collision',d3.forceCollide(65));
const linkEls=g.append('g').selectAll('line').data(links).enter().append('line').attr('class','link');
const nodeG=g.append('g').selectAll('.node-group').data(nodes).enter().append('g').attr('class','node-group')
  .call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;})
  );
nodeG.append('circle').attr('class','node-halo').attr('r',38).attr('stroke',d=>CC[d.cat]);
nodeG.append('circle').attr('class','pulse-ring').attr('r',22).attr('stroke',d=>CC[d.cat]);
nodeG.append('circle').attr('class','node-body').attr('r',22)
  .attr('fill',d=>CC[d.cat]+'22').attr('stroke',d=>CC[d.cat])
  .style('filter',d=>`url(#g-${d.cat})`);
nodeG.append('text').attr('class','node-icon').attr('y',0).style('font-size','14px')
  .style('fill',d=>CC[d.cat]).text(d=>CI[d.cat]);
nodeG.each(function(d){
  const words=d.short.split(' ');
  const mid=Math.ceil(words.length/2);
  const lines=[words.slice(0,mid).join(' '),words.slice(mid).join(' ')].filter(Boolean);
  const lg=d3.select(this).append('g').attr('transform','translate(0,32)');
  lines.forEach((ln,i)=>lg.append('text').attr('class','node-label').attr('y',i*13).style('font-size','10px').text(ln));
});
const tip=document.getElementById('tooltip');
const ttCat=document.getElementById('tt-cat'),ttName=document.getElementById('tt-name'),ttDiff=document.getElementById('tt-diff'),ttConn=document.getElementById('tt-conn');
nodeG
  .on('mouseenter',function(event,d){
    const col=CC[d.cat],conn=new Set([d.id,...adj[d.id]]);
    linkEls.classed('active',l=>l.source.id===d.id||l.target.id===d.id)
           .classed('dimmed',l=>l.source.id!==d.id&&l.target.id!==d.id)
           .style('stroke',l=>(l.source.id===d.id||l.target.id===d.id)?col:null);
    nodeG.classed('dimmed',n=>!conn.has(n.id));
    ttCat.textContent=d.cat;ttCat.style.color=col;
    ttName.textContent=d.name;ttName.style.color=col;
    ttDiff.textContent='● '+d.diff;
    ttConn.textContent='Connects to: '+adj[d.id].map(id=>nodes[id].short).join(' · ');
    tip.classList.add('show');
  })
  .on('mousemove',function(event){
    const pad=18,tw=260;
    let x=event.clientX+pad,y=event.clientY-24;
    if(x+tw>W)x=event.clientX-tw-pad;
    if(y<10)y=10;
    tip.style.left=x+'px';tip.style.top=y+'px';
  })
  .on('mouseleave',function(){
    linkEls.classed('active',false).classed('dimmed',false).style('stroke',null);
    nodeG.classed('dimmed',false);
    tip.classList.remove('show');
  })
  .on('click',function(event,d){
    event.stopPropagation();
    d3.select(this).append('circle').attr('r',22).attr('fill','none')
      .attr('stroke',CC[d.cat]).attr('stroke-width',2).style('pointer-events','none')
      .transition().duration(550).ease(d3.easeQuadOut).attr('r',55).style('opacity',0).remove();
    window.open(d.url,'_blank');
  });
sim.on('tick',()=>{
  linkEls.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeG.attr('transform',d=>`translate(${d.x},${d.y})`);
});
sim.on('end',()=>{
  const bb=g.node().getBBox(),pad=90;
  const sc=Math.min((W-pad*2)/bb.width,(H-pad*2)/bb.height,0.95);
  const tx=(W-sc*(bb.x*2+bb.width))/2,ty=(H-sc*(bb.y*2+bb.height))/2;
  svg.transition().duration(1000).ease(d3.easeCubicInOut)
    .call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(sc));
});
window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  svg.attr('width',W).attr('height',H);
  sim.force('center',d3.forceCenter(W/2,H/2)).alpha(0.3).restart();
});
</script>
</body>
</html>
